<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Private Memories ♾️</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
    --burgundy:#630D16;
    --cream:#FAF9F6;
    --onyx:#1A1A1A;
    --gold:#D4AF37;
}

*{margin:0;padding:0;box-sizing:border-box;cursor:none;}

body{
    font-family:'Poppins',sans-serif;
    background:linear-gradient(180deg,#faf9f6 0%, #fff1f3 100%);
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
}

/* cursor */
#heart-cursor{
    position:fixed;
    width:22px;height:22px;
    background:var(--gold);
    clip-path:path('M12 4.419c-2.826-5.695-11.999-4.064-11.999 3.27 0 7.27 9.903 10.938 11.999 15.311 2.096-4.373 12-8.041 12-15.311 0-7.327-9.17-8.972-12-3.27z');
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:10000;
    filter:drop-shadow(0 0 10px var(--gold));
}

/* card */
.lock-card{
    background:white;
    padding:45px 35px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 30px 70px rgba(0,0,0,0.15);
}

.lock-title{
    font-family:'Playfair Display',serif;
    font-size:2rem;
    color:var(--burgundy);
    font-style:italic;
    margin-bottom:15px;
}

.lock-sub{font-size:.85rem;color:#777;margin-bottom:25px;}

.lock-input{
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--burgundy);
    text-align:center;
}

.btn{
    margin-top:18px;
    background:var(--burgundy);
    color:var(--gold);
    border:1px solid var(--gold);
    padding:14px 30px;
    letter-spacing:3px;
    cursor:pointer;
    width:100%;
}

.error{color:#b00020;font-size:.8rem;margin-top:10px;}
</style>
</head>

<body>

<div id="heart-cursor"></div>

<div class="lock-card">
    <h1 class="lock-title">Private Memories ♾️</h1>
    <p class="lock-sub">Only you can open this part</p>

    <input id="codeInput" type="password" class="lock-input" placeholder="Secret code">
    <button class="btn" onclick="unlock()">Enter</button>

    <p id="msg" class="error"></p>
</div>

<script>
document.addEventListener('mousemove',e=>{
    const c=document.getElementById('heart-cursor');
    c.style.left=e.clientX+'px';
    c.style.top=e.clientY+'px';
});

const SECRET_CODE="ourstory";

function unlock(){
    const val=document.getElementById('codeInput').value;

    if(val===SECRET_CODE){
        localStorage.setItem("storyUnlocked","true");

        const next=sessionStorage.getItem("storyRedirect") || "index.html";
        window.location.href=next;
    }else{
        document.getElementById('msg').innerText="Wrong code 😢";
    }
}
</script>

</body>
</html>
